  {label:'Acquisition',sub:'Discovery & Intent',scenario:'The practice discovers Opencare via a Google ad, peer referral, or dental conference. They visit the landing page and assess whether it\'s worth signing up. Commission structure, ROI potential, and onboarding effort are the three main evaluation criteria.',touchpoints:['📢 Google Ad / Referral','🌐 Opencare Landing Page','💬 Peer recommendation'],actions:['Discovers Opencare via ad, referral, or conference','Visits landing page','Reviews commission model and terms','Compares to existing patient acquisition tools'],emo:{e:'🤔',l:'Curious → Hopeful',d:'"Will this actually save me time and bring in real patients?" The value proposition needs to be immediately clear before they invest any more time.'},pains:['Value proposition not immediately clear vs. existing tools','Commission structure not visible on the landing page — creates hesitation'],opps:[{tag:'high',t:'Transparent ROI calculator on the landing page: "If you have X empty slots per week, Opencare typically fills Y, generating $Z."'},{tag:'quick',t:'Peer testimonials from practices of the same size and type — solo practice owner speaks to solo practice owner.'}]},
  {label:'Sign-Up',sub:'Account Creation',scenario:'Practice creates an account and enters basic information. The goal is to reach the profile as quickly as possible — every extra step before seeing the product in action increases drop-off.',touchpoints:['📝 Sign-up form','📧 Email verification','🟢 Opencare Dashboard (first view)'],actions:['Creates account with basic practice details','Verifies email','Gets first look at the Opencare dashboard'],emo:{e:'🚀',l:'Motivated but impatient',d:'"I want to see what this looks like before I invest too much time setting it up." Any friction before the first meaningful moment of value causes drop-off.'},pains:['Too many fields before seeing the product — practices don\'t understand value before being asked for extensive info','Email verification step adds friction at the most critical momentum moment'],opps:[{tag:'high',t:'Progressive onboarding: minimum viable profile live in under 10 minutes. Collect additional details after the practice has seen the product.'},{tag:'quick',t:'Auto-save progress every step so a practice can return without losing their work if interrupted.'}]},
  {label:'Setup',sub:'Profile Configuration',scenario:'Practice uploads services, sets availability, adds pricing, uploads photos, and enters credentials. This is the longest stage — and the one with the highest drop-off. Without a benchmark, practices don\'t know if their profile is good enough.',touchpoints:['👤 Profile editor','📸 Photo upload','📅 Availability configurator','💰 Pricing settings'],actions:['Uploads services and pricing','Sets weekly availability windows','Adds practitioner photos and bio','Enters credentials and certifications','Uploads office photos'],emo:{e:'😤',l:'Frustrated if setup feels endless',d:'"How much more is there? I just want to go live." Frustration peaks at the profile setup stage. Without a progress indicator and benchmark, practices stall or abandon.'},pains:['Unclear what "good" looks like — no benchmark or preview of how the profile appears to patients','No progress indicator during setup — practices don\'t know how many steps remain'],opps:[{tag:'high',t:'"Profile completeness score" with specific, actionable improvement suggestions: "Add 3 more photos to increase bookings by 40%."'},{tag:'quick',t:'Patient-view preview available at any point during setup — show exactly what patients will see before going live.'}]},
  {label:'Go Live',sub:'Publishing Profile',scenario:'Practice reviews their profile and clicks "Go Live." This is a moment of significant anxiety — they\'re committing to a public-facing presence and don\'t know what to expect.',touchpoints:['✅ Publish button','👁 Preview mode','📧 Go-live confirmation email'],actions:['Reviews profile before publishing','Clicks "Go Live"','Receives go-live confirmation','Waits for first patient activity'],emo:{e:'😰',l:'Anxious — "will patients find me?"',d:'"I\'ve set everything up. Now what? Will anyone actually book?" Without explicit reassurance, the post-publish silence feels like failure.'},pains:['No preview mode before publishing — practices don\'t know what patients will see','No clear next-steps after going live — the post-publish experience feels like a black box'],opps:[{tag:'high',t:'Patient-view preview + explicit go-live checklist. Post-go-live: "Your profile is live — here\'s what happens next and when to expect your first booking."'},{tag:'quick',t:'Estimated time to first booking based on comparable practices: "Practices like yours typically receive their first booking within 48 hours."'}]},
  {label:'First Bookings',sub:'First Patient Activity',scenario:'The practice receives its first patient booking notification. This is the pivotal trust-building moment — if the booking arrives quickly and the patient is well-matched, confidence in the platform jumps sharply.',touchpoints:['🔔 Booking notification','📱 Practice App','📧 Patient brief','📞 Optional: patient call'],actions:['Receives first booking notification','Reviews patient details and appointment brief','Confirms appointment','Prepares for new patient visit','Receptionist updates internal calendar'],emo:{e:'🎉',l:'Excited — trust built',description:'"It actually works." The first booking notification is the most emotionally significant moment in the onboarding journey. Everything before this is overhead — this is the payoff.'},pains:['No explanation of why that patient was matched to them — feels arbitrary','Practice app and internal calendar not synchronised — double-booking risk'],opps:[{tag:'high',t:'Match reason in booking notification: "Patient nearby with Delta Dental PPO — matched to you based on availability and insurance."'},{tag:'quick',t:'Two-way calendar sync at setup — eliminate double-booking risk before the first patient ever arrives.'}]},
  {label:'Retention',sub:'Ongoing Engagement',scenario:'The practice monitors their dashboard, manages their schedule, and reviews earnings. Retention is driven by a clear ROI signal, low admin overhead, and the sense that Opencare is working for them.',touchpoints:['📊 Opencare Dashboard','📧 Weekly digest email','💰 Earnings tab','⭐ Review notifications'],actions:['Checks dashboard weekly (or delegates to receptionist)','Reviews earnings and commission breakdown','Monitors no-show rate','Responds to patient reviews','Evaluates Opencare vs. other acquisition channels'],emo:{e:'😌',l:'Satisfied if admin load decreased',d:'"Opencare is running in the background and bringing in patients." If this is true, the practice stays. If overhead exceeds value, they churn.'},pains:['Dashboard is hard to read at a glance for busy practitioners','No clear comparison of Opencare revenue vs. other channels — hard to justify the commission'],opps:[{tag:'high',t:'Weekly digest email: "Opencare brought you 4 new patients this week ($X revenue)." One clear metric that makes the value undeniable.'},{tag:'strategic',t:'Proactive "your slots are filling slowly — here\'s how to improve visibility" nudge when booking volume drops below baseline.'}]}

// ── state
let activeId=null, segF='all', typeF='all', stageMap={};

// ── init
function init(){
  const types=[...new Set(LIB.map(a=>a.type))];
  const tfr=document.getElementById('typeFR');
  tfr.innerHTML='';

  // All Types chip
  const allChip=document.createElement('div');
  allChip.className='fc on';
  allChip.textContent='All Types';
  allChip.addEventListener('click',()=>setType('all'));
  tfr.appendChild(allChip);

  // One chip per type
  types.forEach(t=>{
    const chip=document.createElement('div');
    chip.className='fc';
    chip.textContent=t;
    chip.addEventListener('click',()=>setType(t));
    tfr.appendChild(chip);
  });
  render(); updateCnt();
  const byT={};LIB.forEach(a=>{if(!byT[a.type])byT[a.type]=0;byT[a.type]++;});
  document.getElementById('view').innerHTML=`<div class="wlc"><div style="font-size:44px">🔬</div><h2>Opencare Research Ops Assistant</h2><p>A living library of UX research artifacts for the Opencare Patient and Practice apps. Browse by type or segment, or search for what you need.</p><div class="wstats">${[['Total',LIB.length],...Object.entries(byT)].map(([l,n])=>`<div class="wst"><div class="wst-n">${n}</div><div class="wst-l">${e(l)}</div></div>`).join('')}</div></div>`;
}

function setType(t){
  console.log('setting type to:', t);
  typeF=t;
  document.querySelectorAll('#typeFR .fc').forEach(el=>{
    el.classList.toggle('on', el.textContent===(t==='all'?'All Types':t));
  });
  applyF();
}
function setSeg(s){
  segF=s;
  document.querySelectorAll('#segFR .fc').forEach(el=>{
    const seg=el.getAttribute('data-seg');
    el.className='fc'+(seg===s?' on'+(s!=='all'?' on'+s.charAt(0).toUpperCase()+s.slice(1):''):'');
  });
  applyF();
}
function applyF(){const q=document.getElementById('srch').value.toLowerCase();render(q);updateCnt(q);}

function fil(q=''){return LIB.filter(a=>{const ms=segF==='all'||a.ct===segF;const mt=typeF==='all'||a.type===typeF;const mq=!q||(a.title+a.type+a.ct).toLowerCase().includes(q);return ms&&mt&&mq;});}
function updateCnt(q=''){const n=fil(q).length;document.getElementById('cnt').textContent=n+' artifact'+(n!==1?'s':'');}

function render(q=''){
  const items=fil(q);const groups={};items.forEach(a=>{if(!groups[a.type])groups[a.type]=[];groups[a.type].push(a);});
  const el=document.getElementById('sbList');
  if(!items.length){el.innerHTML='<div style="padding:16px;text-align:center;font-size:13px;color:#9ca3af">No matches.</div>';return;}
  el.innerHTML=Object.entries(groups).map(([type,arts])=>
    `<div class="sg">${e(type)}</div>`+arts.map(a=>`
    <div class="si ${activeId===a.id?'on':''}" onclick="openArt('${a.id}')">
      <div class="si-t">${e(a.title)}</div>
      <div class="si-m"><span class="bdg ${a.ct==='patient'?'bP':a.ct==='practice'?'bPR':'bB'}">${a.ct}</span><span class="bdg bPM">premade</span></div>
      <div class="si-s">${e(a.v)} · ${e(a.date)}</div>
    </div>`).join('')).join('');
}

function openArt(id){activeId=id;render(document.getElementById('srch').value.toLowerCase());const a=LIB.find(x=>x.id===id);if(a)draw(a);}

function draw(a){
  const gc=a.ct==='patient'?'ahP':a.ct==='practice'?'ahPR':'ahB';
  const cl=a.ct==='both'?'Patient & Practice':(a.ct.charAt(0).toUpperCase()+a.ct.slice(1));
  if(a.type==='User Journey'&&a.stages){drawJourney(a,gc,cl);return;}
  let body='';
  // Persona tagline
  if(a.tagline) body+=`<div class="p-tagline">${e(a.tagline)}</div>`;
  // Stats row
  if(a.stats?.length) body+=`<div class="sec"><div class="stat-g">${a.stats.map(s=>`<div class="stat-c"><div class="stat-l">${e(s.l)}</div><div class="stat-v">${e(s.v)}</div></div>`).join('')}</div></div>`;
  (a.secs||[]).forEach((s,i)=>{
    const n=String(i+1).padStart(2,'0');
    const hdr=`<div class="sh"><span class="sn">${n}</span>${e(s.h)}</div>`;
    if(s.ly==='rich') body+=`<div class="sec">${hdr}<div class="p-rich">${e(s.body||'')}</div></div>`;
    else if(s.ly==='tools') body+=`<div class="sec">${hdr}<div class="p-tools">${(s.tools||[]).map(t=>`<div class="p-tool">${e(t)}</div>`).join('')}</div>${s.insight?`<div class="p-insight"><strong>Insight from product data:</strong> ${e(s.insight)}</div>`:''}</div>`;
    else if(s.ly==='commstyle') body+=`<div class="sec">${hdr}<div class="p-cs-grid">${(s.style||[]).map(x=>`<div class="p-cs-cell"><div class="p-cs-lbl">${e(x.l)}</div><div class="p-cs-val">${e(x.v)}</div></div>`).join('')}</div>${s.desc?`<div class="p-cs-desc">${e(s.desc)}</div>`:''}</div>`;
    else if(s.ly==='goals2') body+=`<div class="sec">${hdr}<div class="p-goals2">${(s.goals||[]).map((g,j)=>`<div class="p-goal"><div class="p-goal-num">${j+1}</div><div class="p-goal-body"><div class="p-goal-title">${e(g.t)}</div><div class="p-goal-desc">${e(g.d)}</div></div></div>`).join('')}</div>${s.why?`<div class="p-why"><strong>Why Opencare?</strong> ${e(s.why)}</div>`:''}</div>`;
    else if(s.ly==='pains2') body+=`<div class="sec">${hdr}<div class="p-pains2">${(s.pains||[]).map(p=>`<div class="p-pain"><div class="p-pain-icon">${p.icon||'⚠️'}</div><div class="p-pain-body"><div class="p-pain-title">${e(p.t)}</div><div class="p-pain-desc">${e(p.d)}</div></div></div>`).join('')}</div></div>`;
    else if(s.ly==='queries') body+=`<div class="sec">${hdr}<div class="p-queries">${(s.queries||[]).map(q=>`<div class="p-query">${e(q)}</div>`).join('')}</div></div>`;
    else if(s.ly==='goals') body+=`<div class="sec">${hdr}<div class="goals">${(s.c||[]).map((g,j)=>`<div class="gi"><div class="gn">${j+1}</div><div>${e(g)}</div></div>`).join('')}</div></div>`;
    else if(s.ly==='tags') body+=`<div class="sec">${hdr}<div class="tags">${(s.c||[]).map(t=>`<div class="tag">${e(t)}</div>`).join('')}</div></div>`;
    else if(s.ly==='pains'){const ic=['🔍','📄','💸','🗓','⏱','😟','📸','🤷','💬','📋'];body+=`<div class="sec">${hdr}<div class="pains">${(s.c||[]).map((p,j)=>`<div class="pi"><span style="font-size:14px;flex-shrink:0">${ic[j%ic.length]}</span><span>${e(p)}</span></div>`).join('')}</div></div>`;}
    else if(s.ly==='opps') body+=`<div class="sec">${hdr}<div class="opps">${(s.c||[]).map(o=>`<div class="oi"><span>✦</span><span>${e(o)}</span></div>`).join('')}</div></div>`;
    else if(s.ly==='jtbd') body+=`<div class="sec">${hdr}<div class="jtbd-b"><div class="jr"><span class="jl">Situation</span><span>${e(s.sit||'')}</span></div><div class="jr"><span class="jl">Motivation</span><span>${e(s.mot||'')}</span></div><div class="jr"><span class="jl">Outcome</span><span>${e(s.out||'')}</span></div></div></div>`;
    else if(s.ly==='blueprint') body+=`<div class="sec"><div class="bpr"><span class="bpl ${s.lane}">${e(s.ll)}</span><div class="bullets">${(s.c||[]).map(c=>`<div class="bi"><span class="bd">·</span><span>${e(c)}</span></div>`).join('')}</div></div></div>`;
    else if(s.ly==='empathy') body+=`<div class="sec"><div class="empg"><div class="eq eqT"><div class="eqh">💭 Thinks</div>${(s.thinks||[]).map(x=>`<div class="eqi">${e(x)}</div>`).join('')}</div><div class="eq eqF"><div class="eqh">❤️ Feels</div>${(s.feels||[]).map(x=>`<div class="eqi">${e(x)}</div>`).join('')}</div><div class="eq eqS"><div class="eqh">💬 Says</div>${(s.says||[]).map(x=>`<div class="eqi">${e(x)}</div>`).join('')}</div><div class="eq eqD"><div class="eqh">🤝 Does</div>${(s.does||[]).map(x=>`<div class="eqi">${e(x)}</div>`).join('')}</div></div></div>`;
    else if(s.ly==='ecosystem') body+=`<div class="sec">${(s.groups||[]).map(g=>`<div class="ecog"><div class="ecog-t">${e(g.t)}</div><div class="econ">${(g.ns||[]).map(n=>`<div class="en ${g.nt}">${e(n)}</div>`).join('')}</div></div>`).join('')}${s.flows?.length?`<div style="margin-top:12px"><div class="sh" style="margin-bottom:8px">Key Flows</div>${s.flows.map(f=>`<div class="oi" style="margin-bottom:6px"><span>→</span><span style="font-size:12px">${e(f)}</span></div>`).join('')}</div>`:''}</div>`;
    else body+=`<div class="sec">${hdr}<div class="bullets">${(s.c||[]).map(c=>`<div class="bi"><span class="bd">·</span><span>${e(c)}</span></div>`).join('')}</div></div>`;
  });
  let foot='';
  if(a.assumptions?.length) foot+=`<div class="afa">⚠️ <strong>Assumptions:</strong> ${a.assumptions.map(x=>e(x)).join(' · ')}</div>`;
  (a.sources||[]).forEach(s=>{foot+=`<div class="afs">📦 ${e(s)}</div>`;});
  foot+=`<div class="afs">🏷 ${e(a.v)} · ${e(a.date)}</div>`;
  document.getElementById('view').innerHTML=`<div class="aw"><div class="ah ${gc}"><div class="ah-ey">${e(a.type)} · ${cl}</div><div class="ah-ti">${e(a.title)}</div><div class="ah-bd"><span class="ah-b">${cl}</span><span class="ah-b">Premade</span></div><div class="ah-mt">${e(a.v)}<br/>${e(a.date)}</div></div><div class="ab">${body}<div class="afoot">${foot}</div></div></div>`;
}

function drawJourney(a,gc,cl){
  if(!stageMap[a.id]) stageMap[a.id]=0;
  const si=stageMap[a.id];
  const stg=a.stages[si];
  const ph=`<div class="j-ph"><div class="j-pm"><div class="j-pi">${a.pIcon||'👤'}</div><div class="j-pinfo"><div class="j-pname">${e(a.pName||'')}</div><div class="j-psub">${e(a.pSub||'')}</div><div class="j-pq">${e(a.pQ||'')}</div><div class="j-ptags">${(a.pTags||[]).map(t=>`<span class="j-ptag">${e(t)}</span>`).join('')}</div></div></div></div>`;
  const ec=`<div class="j-ec"><div class="j-ect">Emotional Curve</div><div class="j-ecr">${(a.emo||[]).map((em,i)=>`<div class="j-ecs"><div class="j-ecd"></div><div class="j-ecl">${e(em.l)}</div><div class="j-ecst">${e(em.s)}</div></div>${i<a.emo.length-1?'<div class="j-ecline"></div>':''}`).join('')}</div></div>`;
  const tabs=`<div class="j-tabs">${a.stages.map((s,i)=>`<div class="j-tab ${i===si?'on':''}" onclick="pickStage('${a.id}',${i})">${e(s.label||s)}</div>`).join('')}</div>`;
  const detail=`<div id="jsd_${a.id}">${stageDetail(stg)}</div>`;
  const dops=a.dOps?.length?`<div class="j-do"><div class="j-dot">Design Opportunities</div><div class="j-doc">${a.dOps.map(d=>`<div class="j-dc"><div class="j-dci">${d.i||'💡'}</div><div class="j-dcs">${e(d.s||'')}</div><div class="j-dct">${e(d.t||'')}</div><div class="j-dcb">${e(d.b||'')}</div><div class="j-dctag">${e(d.tag||'')}</div></div>`).join('')}</div></div>`:'';
  let foot='';
  if(a.assumptions?.length) foot+=`<div class="afa">⚠️ <strong>Assumptions:</strong> ${a.assumptions.map(x=>e(x)).join(' · ')}</div>`;
  (a.sources||[]).forEach(s=>{foot+=`<div class="afs">📦 ${e(s)}</div>`;});
  foot+=`<div class="afs">🏷 ${e(a.v)} · ${e(a.date)}</div>`;
  document.getElementById('view').innerHTML=`<div class="aw"><div class="ah ${gc}"><div class="ah-ey">User Journey · ${cl}</div><div class="ah-ti">${e(a.title)}</div><div class="ah-bd"><span class="ah-b">${cl}</span><span class="ah-b">Premade</span></div><div class="ah-mt">${e(a.v)}<br/>${e(a.date)}</div></div><div class="ab">${ph}${ec}${tabs}${detail}${dops}<div class="afoot">${foot}</div></div></div>`;
}

function stageDetail(s){
  if(!s) return '';
  const tc=t=>t==='high'?'high':t==='quick'?'quick':t==='strategic'?'strategic':'default';
  return `
    <div class="j-row"><div class="j-rl"><span class="j-ri">🎬</span>Scenario</div><div class="j-rb">${e(s.scenario||'')}</div></div>
    <div class="j-row"><div class="j-rl"><span class="j-ri">📍</span>Touch&shy;points</div><div class="j-rb"><div class="j-tps">${(s.touchpoints||[]).map(t=>`<span class="j-tp">${e(t)}</span>`).join('')}</div></div></div>
    <div class="j-row"><div class="j-rl"><span class="j-ri">🖱️</span>User Actions</div><div class="j-rb"><ul>${(s.actions||[]).map(a=>`<li>${e(a)}</li>`).join('')}</ul></div></div>
    <div class="j-row"><div class="j-rl"><span class="j-ri">💭</span>Emotions</div><div class="j-rb"><div class="j-emo">${s.emo?.e||''} <strong>${e(s.emo?.l||'')}</strong></div><div class="j-emodesc">${e(s.emo?.d||s.emo?.description||'')}</div></div></div>
    <div class="j-row"><div class="j-rl"><span class="j-ri">⚠️</span>Pain Points</div><div class="j-rb">${(s.pains||[]).map(p=>`<div class="j-pc"><span>⚠️</span><span>${e(p)}</span></div>`).join('')}</div></div>
    <div class="j-row" style="border-bottom:none"><div class="j-rl"><span class="j-ri">💡</span>Oppor&shy;tunities</div><div class="j-rb">${(s.opps||[]).map(o=>`<div class="j-oc"><div class="j-otag ${tc(o.tag)}">${e(o.tag||'opportunity')}</div><div>${e(o.t||'')}</div></div>`).join('')}</div></div>`;
}

function pickStage(id,idx){
  stageMap[id]=idx;
  const a=LIB.find(x=>x.id===id);if(!a)return;
  document.querySelectorAll('.j-tab').forEach((el,i)=>el.classList.toggle('on',i===idx));
  const det=document.getElementById('jsd_'+id);if(det) det.innerHTML=stageDetail(a.stages[idx]);
}

function e(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

init();
console.log('Library v2 loaded.',LIB.length,'artifacts.',LIB.filter(a=>a.type==='User Journey').length,'user journeys.');
</script>
</body>
</html>
